<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calvin Krogh</title>
  <meta name="description" content="Min nettside. Kontakt meg eller meld deg på nyhetsbrev.">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
</head>
<body>
  <div class="wrap">

    <header>
      <a href="index.html" class="site-name">Calvin Krogh</a>
    </header>

    <!-- Kontaktskjema -->
    <section>
      <p class="section-intro">Vil du kontakte meg, kan du gjøre det her:</p>

      <div class="field">
        <label for="f-name">Navn</label>
        <input type="text" id="f-name" placeholder="Ditt navn">
      </div>

      <div class="field">
        <label for="f-email">E-post</label>
        <input type="email" id="f-email" placeholder="din@epost.no">
      </div>

      <div class="field">
        <label for="f-msg">Melding</label>
        <textarea id="f-msg" rows="6" placeholder="Skriv her..."></textarea>
      </div>

      <button id="send-btn" onclick="encryptAndSend()">Send</button>

      <p class="status" id="contact-status"></p>
    </section>

    <hr>

    <!-- Nyhetsbrev -->
    <section class="newsletter">
      <p class="section-intro">Skal du ha nyhetsbrev når det faller meg inn å sende et, meld deg på her:</p>
      <div class="newsletter-row">
        <input type="email" id="nl-email" placeholder="din@epost.no">
        <button class="btn-filled" onclick="subscribeNewsletter()">Meld meg på</button>
      </div>
      <p class="status" id="nl-status"></p>
    </section>

    <footer>
      <p>© <span id="year"></span> Calvin Krogh</p>
    </footer>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/openpgp/5.11.2/openpgp.min.js"></script>

    const WEB3FORMS_KEY = '6534d69a-e649-4d6c-8542-20dcd91f0bff';

    async function encryptAndSend() {
      const name = document.getElementById('f-name').value.trim();
      const email = document.getElementById('f-email').value.trim();
      const msg = document.getElementById('f-msg').value.trim();
      const statusEl = document.getElementById('contact-status');

      if (!name || !email || !msg) {
        showStatus(statusEl, 'Fyll ut alle felt.');
        return;
      }

      const btn = document.getElementById('send-btn');
      btn.textContent = 'Sender…';
      btn.disabled = true;

      try {
        const publicKey = await openpgp.readKey({ armoredKey: ARMORED_PUBLIC_KEY });
        const plaintext = `Fra: ${name} <${email}>\nDato: ${new Date().toLocaleString('nb-NO')}\n\n${msg}`;
        const encrypted = await openpgp.encrypt({
          message: await openpgp.createMessage({ text: plaintext }),
          encryptionKeys: publicKey,
        });

        const formData = new FormData();
        formData.append('access_key', WEB3FORMS_KEY);
        formData.append('subject', 'Ny melding fra calvin.no');
        formData.append('message', encrypted);
        formData.append('from_name', 'calvin.no kontaktskjema');
        formData.append('botcheck', '');

        const response = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();

        if (result.success) {
          showStatus(statusEl, 'Melding sendt.');
          document.getElementById('f-name').value = '';
          document.getElementById('f-email').value = '';
          document.getElementById('f-msg').value = '';
        } else {
          showStatus(statusEl, 'Noe gikk galt. Prøv igjen.');
        }
      } catch(e) {
        showStatus(statusEl, 'Feil: ' + e.message);
      } finally {
        btn.textContent = 'Send';
        btn.disabled = false;
      }
    }

    async function subscribeNewsletter() {
      const email = document.getElementById('nl-email').value.trim();
      const statusEl = document.getElementById('nl-status');

      if (!email) {
        showStatus(statusEl, 'Skriv inn e-postadressen din.');
        return;
      }

      const btn = document.querySelector('.btn-filled');
      btn.textContent = 'Sender…';
      btn.disabled = true;

      try {
        const formData = new FormData();
        formData.append('access_key', WEB3FORMS_KEY);
        formData.append('subject', 'Ny nyhetsbrevpåmelding fra calvin.no');
        formData.append('message', `Ny påmelding: ${email}`);
        formData.append('from_name', 'calvin.no nyhetsbrev');
        formData.append('botcheck', '');

        const response = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();

        if (result.success) {
          showStatus(statusEl, 'Du er meldt på.');
          document.getElementById('nl-email').value = '';
        } else {
          showStatus(statusEl, 'Noe gikk galt. Prøv igjen.');
        }
      } catch(e) {
        showStatus(statusEl, 'Feil: ' + e.message);
      } finally {
        btn.textContent = 'Meld meg på';
        btn.disabled = false;
      }
    }

    function showStatus(el, msg) {
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>

</body>
</html>
