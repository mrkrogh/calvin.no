<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calvin Krogh</title>
  <meta name="description" content="Min nettside. Kontakt meg eller meld deg på nyhetsbrev.">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
</head>
<body>
  <div class="wrap">

    <header>
      <a href="/" class="site-name">Calvin Krogh</a>
    </header>

    <section>
      <p>Vil du kontakte meg, send en e-post til <a href="mailto:post@calvin.no">post@calvin.no</a>.</p>
    </section>

    <section class="newsletter">
      <p>Skal du ha nyhetsbrev når det faller meg inn å sende et, meld deg på her:</p>
      <form action="https://buttondown.com/api/emails/embed-subscribe/calvinkrogh" method="post">
        <div class="newsletter-row">
          <input type="email" name="email" id="bd-email" placeholder="din@epost.no">
          <button type="submit">Meld meg på</button>
        </div>
      </form>
      <p class="status" id="nl-status"></p>
    </section>

    <footer>
      <p>© <span id="year"></span> Calvin Krogh</p>
    </footer>

  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
